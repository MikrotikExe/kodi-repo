name: Build & Release Kodi Repo

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:    # manuálne spustenie z Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Kodi repo (docs/)
        run: python3 scripts/build_repo.py

      - name: Commit & push docs/ back to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "Nothing to commit — docs/ already up to date"
          else
            git commit -m "Auto-rebuild docs/ for ${GITHUB_REF_NAME}"
            git push origin HEAD:main
          fi

      - name: Collect ZIPs for the release
        run: |
          mkdir -p release_assets
          find docs -name "*.zip" -exec cp {} release_assets/ \;
          ls -la release_assets/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*.zip
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
